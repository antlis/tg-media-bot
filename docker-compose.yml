services:
  telegram-bot-api:
    # NOTE: the daemon runs as uid 101 and creates 750 dirs; host access for
    # tg-mpv-bot comes from default ACLs on ~/telegram-bot-api-data (see that
    # repo's README) — the entrypoint must stay root, user: breaks it.
    image: aiogram/telegram-bot-api:latest
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
    volumes:
      # Host bind (not a named volume): in TELEGRAM_LOCAL mode the server
      # returns filesystem paths, and tg-mpv-bot (running on the host) reads
      # downloaded files straight from this directory.
      - ~/telegram-bot-api-data:/var/lib/telegram-bot-api
    ports:
      # Host port is configurable (8081 is often already taken); the bot reaches
      # the server over the internal Compose network regardless of this mapping.
      - "${BOT_API_HOST_PORT:-8082}:8081"
    restart: unless-stopped
    healthcheck:
      # The bot API server returns 404 on "/" (no root route), which fails an
      # HTTP spider check — so probe that the port is accepting connections.
      test: ["CMD", "nc", "-z", "127.0.0.1", "8081"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  bot:
    # `docker compose up` pulls the prebuilt image; `up --build` builds from
    # this checkout instead (for local development / unreleased changes).
    image: ghcr.io/antlis/tg-media-bot:latest
    build: .
    env_file: .env
    environment:
      API_SERVER_URL: http://telegram-bot-api:8081
      USE_BROWSER_COOKIES: "false"
      # Netscape-format cookies for authenticated downloads (Instagram etc.).
      # Drop a cookies.txt into ./cookies/ on the host — picked up per-download,
      # no restart needed. Mounted read-write because yt-dlp writes refreshed
      # cookies back to the file after each run.
      COOKIES_FILE: /cookies/cookies.txt
      LOG_FILE: /data/tg-media-bot.log
      # Auto-allowed groups (bot added by an ALLOWED_USER) persist here
      ALLOWED_CHATS_FILE: /data/allowed_chats.json
    volumes:
      - bot-downloads:/tmp/tg-media-bot
      - bot-logs:/data
      - ./cookies:/cookies
    depends_on:
      telegram-bot-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  bot-downloads:
  bot-logs:
