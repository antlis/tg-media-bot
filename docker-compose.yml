services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    ports:
      - "8082:8081"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8081/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  bot:
    build: .
    env_file: .env
    environment:
      API_SERVER_URL: http://telegram-bot-api:8081
      USE_BROWSER_COOKIES: "false"
    volumes:
      - bot-downloads:/tmp/tg-media-bot
    depends_on:
      telegram-bot-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  telegram-bot-api-data:
  bot-downloads:
